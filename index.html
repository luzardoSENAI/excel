<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curso Excel Avançado - SENAI</title>
<link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/3/34/Microsoft_Office_Excel_%282019%E2%80%93present%29.svg" type="image/svg+xml">
<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#f4f6f9;
}

/* HEADER */
header{
  background:linear-gradient(90deg,#004a8d,#f37021);
  color:white;
  padding:20px;
  text-align:center;
}

header img{
  height:100px;
  display:block;
  margin:0 auto 10px auto;
}

/* LOGIN */
#loginOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:1000;
}

.login-box{
  background:white;
  padding:30px;
  border-radius:12px;
  width:90%;
  max-width:350px;
  text-align:center;
}

.login-box img{
  height:80px;
  margin-bottom:15px;
}

.login-box input{
  width:100%;
  padding:10px;
  margin:8px 0;
  font-size:16px;
}

.login-box button{
  width:100%;
  padding:10px;
  background:#004a8d;
  color:white;
  border:none;
  font-size:16px;
  cursor:pointer;
}

/* BOTÃO MATERIAL */
.top-actions{
  text-align:center;
  margin:20px;
}

.material-btn{
  background:#f37021;
  color:white;
  padding:12px 20px;
  border:none;
  border-radius:6px;
  font-size:16px;
  cursor:pointer;
}

/* PROGRESSO */
#progressContainer{
  width:90%;
  margin:20px auto;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
}

#progressBar{
  height:25px;
  width:0%;
  background:#004a8d;
  color:white;
  text-align:center;
  line-height:25px;
  font-weight:bold;
}

/* CONTAINER */
.container{
  display:flex;
  justify-content:space-around;
  flex-wrap:wrap;
  gap:20px;
  padding:20px;
}

/* MODULO */
.modulo{
  background:white;
  border-radius:12px;
  width:30%;
  min-width:280px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

.modulo h3{
  background:#004a8d;
  color:white;
  margin:0;
  padding:15px;
  text-align:center;
  font-size:18px;
}

.modulo ul{
  list-style:none;
  padding:15px;
  margin:0;
}

.modulo li{
  margin-bottom:12px;
}

/* DIA CARD */
.dia-card{
  background:#fff;
  border-left:5px solid #f37021;
  padding:12px;
  border-radius:8px;
  transition:0.3s;
  cursor:pointer;
}

.dia-card:hover{
  transform:translateY(-2px);
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.dia-card small{
  display:block;
  font-size:13px;
  color:#555;
}

.locked{
  opacity:0.5;
  pointer-events:none;
}

.liberado{
  border-left:5px solid #28a745 !important;
}

.status{
  font-weight:bold;
  margin-bottom:5px;
}

/* POPUP */
.popup-content{
  display:none;
  margin-top:10px;
  padding:15px;
  background:#eef3f9;
  border-left:5px solid #f37021;
  border-radius:6px;
  animation:fadeIn 0.3s ease-in-out;
}

.popup-content button{
  margin-top:10px;
  padding:8px 12px;
  border:none;
  background:#004a8d;
  color:white;
  cursor:pointer;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(-5px);}
  to{opacity:1;transform:translateY(0);}
}

/* RESPONSIVO */
@media(max-width:900px){
  .modulo{width:45%;}
}

@media(max-width:600px){
  .container{
    flex-direction:column;
    align-items:center;
  }
  .modulo{width:95%;}
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  background:#004a8d;
  color:white;
  margin-top:40px;
}
</style>
</head>

<body>

<div id="progressContainer">

</div>

<div class="container" id="menuDias"></div>

<footer>
SERVIÇO NACIONAL DE APRENDIZAGEM INDUSTRIAL - SENAI.
  <button class="material-btn"

S

</footer>

<script>
const totalDias = 28;
const dataInicioCurso = new Date(2026,1,23);

function login(){
  const user=document.getElementById('usuario').value;
  const senha=document.getElementById('senha').value;
  if(user==='excel' && senha==='senai'){
    document.getElementById('loginOverlay').style.display='none';
    iniciarCurso();
  }else{
    alert('Usuário ou senha inválidos');
  }
}

function contarDiasUteis(inicio,fim){
  if(fim<inicio) return 0;
  let count=0;
  let current=new Date(inicio);
  while(current<=fim){
    if(current.getDay()!==0 && current.getDay()!==6) count++;
    current.setDate(current.getDate()+1);
  }
  return count;
}

function iniciarCurso(){
  gerarEstrutura();
  const hoje=new Date();
  const diasLiberados=Math.min(contarDiasUteis(dataInicioCurso,hoje),totalDias);
  atualizarLiberacao(diasLiberados);
}

function gerarEstrutura(){
const aulas = [
{
titulo:"Introdução e Estética da Planilha",
conteudo:["Formatação de células no Excel (Parte I e II)","Como formatar textos no Excel"],
exercicio:"Criar um horário de aulas ou de turnos. O aluno deve utilizar mescla de células, aplicar cores de preenchimento distintas para cada disciplina/turno e utilizar bordas espessas para destacar o cabeçalho."
},
{
titulo:"Produtividade e Primeiros Passos Práticos",
conteudo:["Recurso de Ajuda e Backup automático","Formatando uma planilha na prática","Auto Preenchimento e Preenchimento Relâmpago"],
exercicio:"Numa coluna, introduzir o primeiro dia do ano e usar o Auto Preenchimento para arrastar até ao final do mês. Noutra coluna, ter uma lista de nomes completos e utilizar o Preenchimento Relâmpago para separar rapidamente os primeiros nomes dos apelidos."
},
{
titulo:"Organização de Dados e Impressão",
conteudo:["Formatando dados como Tabela e Colar Valores","Ferramenta Pincel e Congelar Painéis","Trabalhando com Texto para Colunas","Tudo sobre impressão no Excel"],
exercicio:"Importar uma lista de produtos separados por vírgulas, utilizar Texto para Colunas para os separar, formatar o intervalo como Tabela e congelar a linha superior para que o cabeçalho fique visível ao fazer scroll."
},
{
titulo:"Lógica Matemática no Excel",
conteudo:["Operações fundamentais (Soma, Subtração, Multiplicação e Divisão) e Ordem de Cálculos","Porcentagem no Excel","Referência de Células (Relativas e Absolutas)"],
exercicio:"Criar uma folha de orçamentos. Calcular o valor total (Quantidade * Preço Unitário). Numa célula à parte, definir uma taxa de IVA (ex: 23%) e calcular o imposto de cada produto utilizando Referências Absolutas (trancando a célula do IVA com F4)."
},
{
titulo:"Análise Rápida e Primeiras Condicionais",
conteudo:["Funções MÉDIA, MÁXIMO e MÍNIMO","Funções de contagem e soma condicional simples: SOMASE e CONT.SE"],
exercicio:"Numa pauta de avaliações, utilizar as funções MÁXIMO, MÍNIMO e MÉDIA para encontrar a nota mais alta, a mais baixa e a média da turma. Usar CONT.SE para contar quantos alunos obtiveram nota igual ou superior a 10."
},
{
titulo:"Manipulação de Textos e Datas",
conteudo:["Funções de Texto: CONCATENAR, Direita, Esquerda, Ext.texto, Localizar/Substituir, MAIÚSCULA & MINÚSCULA","Funções de Data: HOJE, AGORA, DATA, DIA, MÊS, ANO e DATAM"],
exercicio:"Utilizar CONCATENAR (ou UNIRTEXTO) para juntar o nome do aluno e o seu número de matrícula. Noutra coluna, inserir a data atual com HOJE() e calcular a data de vencimento de uma propina somando 30 dias."
},
{
titulo:"Condicionais e Visualização Inicial",
conteudo:["Introdução à Função SE","Passo a Passo da Formatação Condicional (Todas as regras, Escalas, Ícones e Barras)","Criando Gráficos no Excel (Elementos, Tipos, Design) e Minigráficos"],
exercicio:"Aplicar Formatação Condicional na pauta do Dia 5: notas negativas a vermelho e positivas a verde. Utilizar a Função SE para criar uma coluna de estado que escreva automaticamente 'Aprovado' ou 'Reprovado'."
},
{
titulo:"Auditoria e Estruturação de Fórmulas",
conteudo:["Mostrando e destacando fórmulas (Auditoria)","Intervalos para fórmulas e Nomeação de Intervalos","Copiando/colando valores com Drag and Drop","Calculando em diversas guias e Hierarquia de Fórmulas"],
exercicio:"Nomear um intervalo de células de uma tabela de preços como 'Precos_Tabela'. Numa guia separada, criar uma fórmula que multiplique uma quantidade pelos valores desse intervalo nomeado. Utilizar a Auditoria de Fórmulas para rastrear os precedentes."
},
{
titulo:"Lógica Condicional Avançada (Parte I)",
conteudo:["Aprofundamento na Função SE (Várias Funções SE na mesma Fórmula)","Função SES"],
exercicio:"Substituir o SE simples por uma função SES (ou SEs aninhados) para categorizar o desempenho das vendas de funcionários em: 'Excelente', 'Bom', 'Suficiente' ou 'Insuficiente', dependendo do valor faturado."
},
{
titulo:"Lógica Condicional Avançada (Parte II)",
conteudo:["Integração da Função SES com a Função E e Função OU"],
exercicio:"Criar um sistema de bónus. Utilizar a função SE combinada com E e OU para atribuir um bónus apenas se o funcionário tiver vendas > 5000€ E faltas = 0."
},
{
titulo:"Estatística Aplicada",
conteudo:["Funções MÉDIA, MEDIANA e MODA","Criando Ranking automático","Encontrando células em branco (CONTAR.VAZIO, CONT.VALORES, CONT.NÚM)"],
exercicio:"Numa lista de idades de clientes, calcular a MEDIANA e a MODA. Numa lista de presenças, utilizar CONTAR.VAZIO para identificar quantos dias não foram registados."
},
{
titulo:"Cálculos com Múltiplos Critérios",
conteudo:["Médias com condições: MÉDIASE e MÉDIASES","Contagem e Soma complexas: CONT.SES, SOMASES, MÁXIMOSES e MÍNIMOSES"],
exercicio:"Numa folha de cálculo de Recursos Humanos, calcular a média salarial apenas do departamento de 'Marketing' (MÉDIASE) e somar os salários totais de 'Vendas' da região 'Norte' (SOMASES)."
},
{
titulo:"Funções de Banco de Dados",
conteudo:["Funções BD: BDSOMA, BDCONTAR, BDMÁX, BDMÍN, BDMÉDIA e BDEXTRAIR"],
exercicio:"Construir uma base de dados de inventário. Criar um pequeno painel superior onde o aluno digita critérios (ex: Categoria e Fornecedor) e utilizar BDSOMA e BDCONTAR para calcular automaticamente o total em armazém apenas dos itens que cumprem esses critérios."
},
{
titulo:"Aprofundamento em Datas e Tempos",
conteudo:["Função DATADIF","Função DIA.DA.SEMANA combinada com a Função SE"],
exercicio:"Utilizar a função DATADIF para calcular a idade exata em anos e meses dos funcionários a partir das suas datas de nascimento. Usar DIA.DA.SEMANA combinado com SE para indicar se um dia de trabalho caiu num 'Fim de semana' ou 'Dia Útil'."
},
{
titulo:"Tratamento Avançado de Textos",
conteudo:["Função ARRUMAR, CONCAT, UNIRTEXTO","Funções MUDAR, SUBSTITUIR e NÚM.CARACT"],
exercicio:"Receber uma base de dados 'suja' (com espaços extra e códigos antigos). Utilizar ARRUMAR para limpar os espaços e SUBSTITUIR para trocar códigos de área telefónicos antigos por novos."
},
{
titulo:"Tratamento de Erros e Validação",
conteudo:["Funções de Informação (ÉTEXTO, ÉNÚM e É.NÃO.TEXTO)","Conhecendo os erros no Excel, Função ÉERRO com SE, e Função SEERRO"],
exercicio:"Provocar intencionalmente um erro de divisão por zero (#DIV/0!) numa folha de cálculo de margens de lucro. Em seguida, envolver a fórmula numa função SEERRO para apresentar a mensagem 'Dados Incompletos' em vez do erro."
},
{
titulo:"O Motor de Busca do Excel (Parte I)",
conteudo:["PROCV e PROCH","PROCV DUPLO e Erros comuns no PROCV"],
exercicio:"Criar um formulário de faturação. O aluno deve digitar o Código do Produto e usar o PROCV para buscar automaticamente a Descrição e o Preço Unitário numa tabela matriznoutra folha."
},
{
titulo:"O Motor de Busca do Excel (Parte II)",
conteudo:["PROCV com CORRESP","Funções ESCOLHER e PARÂMETRO"],
exercicio:"Aprimorar a fatura anterior: combinar o PROCV com a função CORRESP para que o núm_índice_coluna seja dinâmico, evitando que a fórmula se quebre se adicionarmos uma nova coluna à tabela matriz."
},
{
titulo:"Buscas Matriciais",
conteudo:["Função ÍNDICE","O poder da combinação ÍNDICE e CORRESP"],
exercicio:"Resolver o limite do PROCV (que só procura da esquerda para a direita). O aluno terá o nome do funcionário e deverá utilizar ÍNDICE e CORRESP para procurar o seu ID de funcionário que se encontra numa coluna à esquerda do nome."
},
{
titulo:"Estruturação de Tabelas Dinâmicas",
conteudo:["Introdução e Requisitos para Tabela Dinâmica","Criando a Tabela e utilizando as Recomendadas","Pivotando campos e Configurações da Tabela"],
exercicio:"A partir de uma base de 500+ linhas de vendas, inserir uma Tabela Dinâmica. Pivotar os dados para mostrar o total de faturação por mês nas linhas e por vendedor nas colunas."
},
{
titulo:"Dinâmicas Avançadas",
conteudo:["Criando Tabela Dinâmica com dados externos","Consolidando Tabelas Dinâmicas"],
exercicio:"Consolidar Tabelas Dinâmicas. O aluno terá três separadores (Lisboa, Porto, Faro) com estruturas idênticas e terá de criar uma única Tabela Dinâmica que consolide os dados das três regiões."
},
{
titulo:"Introdução à Automação e ETL",
conteudo:["Texto para Colunas com Power Query","Entendendo o que é Macro e conhecendo o VBA"],
exercicio:"Utilizar o Power Query para importar um ficheiro de texto (.txt ou .csv), limpar as colunas desnecessárias no editor do Power Query e carregar os dados limpos de volta para o Excel."
},
{
titulo:"Aplicação de Macros",
conteudo:["Gravando a Primeira Macro","Macro com Referências Relativas, Segurança e Execução na barra de Acesso Rápido"],
exercicio:"Gravar a primeira Macro (VBA). A macro deve formatar uma tabela selecionada: aplicar bordas, preenchimento cinzento no cabeçalho e formato de moeda. Inserir uma 'Forma' (botão) na folha e atribuir-lhe essa Macro."
},
{
titulo:"Gráficos Avançados (Parte I)",
conteudo:["A arte dos Gráficos Dinâmicos","Gráficos Complexos: Velocímetro, Meta vs Realizado, Comparação, Funil de Vendas"],
exercicio:"Criar um Gráfico de Funil de Vendas com base num processo comercial (Contactos > Reuniões > Propostas > Fechos) e construir um gráfico de Meta vs. Realizado cruzando barras com linhas."
},
{
titulo:"Gráficos Avançados (Parte II)",
conteudo:["Gráficos: PARETO, Bidirecional e Avaliação de Desempenho","Interatividade: Gráficos com Barra de Rolagem, Caixas de Combinação e Formatação Condicional"],
exercicio:"Construir um Gráfico de Pareto para analisar as principais reclamações de clientes. Inserir uma Caixa de Combinação (Controlos de Formulário) para alternar a visualização dos dados."
},
{
titulo:"Construção de Dashboards (Parte I)",
conteudo:["Planeamento, Desenho e Paleta de Cores","Preparação rigorosa da Base de Dados"],
exercicio:"Preparação do 'Backend'. Os alunos devem criar separadores distintos para a 'Base de Dados', 'Cálculos/Apoio' e 'Dashboard'. Devem estruturar todas as Tabelas Dinâmicas necessárias na folha de cálculos."
},
{
titulo:"Construção de Dashboards (Parte II)",
conteudo:["Montagem e Formatação do Dashboard Profissional","Dashboards com Power View (Fluxo de Caixa)"],
exercicio:"Montar o painel final (Frontend). Inserir Gráficos Dinâmicos no separador Dashboard, remover as linhas de grelha e aplicar Segmentações de Dados (Slicers) conectadas a todos os gráficos, criando um ambiente totalmente interativo."
},
{
titulo:"Encerramento, Integrações e Mercado",
conteudo:["Indicadores Estratégicos e Funções fáceis para Entrevista de Emprego","Integração do Excel com o PowerPoint (Slides Mestres, Imagens)","Integração do Excel com o Word (Edição de PDF e Modelos)"],
exercicio:"Integrar o Dashboard com o PowerPoint. Os alunos devem copiar os gráficos principais do Dashboard e fazer uma 'Colagem Especial (Ligar)' num slide em branco, provando que ao alterar um dado no Excel, o slide se atualiza automaticamente."
}
];

  const container=document.getElementById('menuDias');
  container.innerHTML='';

  const modulos=[
    {nome:'Módulo 1 – Excel Básico (10 dias)',inicio:1,fim:10},
    {nome:'Módulo 2 – Excel Intermediário (9 dias)',inicio:11,fim:19},
    {nome:'Módulo 3 – Excel Avançado (9 dias)',inicio:20,fim:28}
  ];

  let dataTemp=new Date(dataInicioCurso);

  modulos.forEach(mod=>{
    const div=document.createElement('div');
    div.className='modulo';
    div.innerHTML=`<h3>${mod.nome}</h3>`;
    const ul=document.createElement('ul');

    for(let i=mod.inicio;i<=mod.fim;i++){
      while(dataTemp.getDay()===0||dataTemp.getDay()===6){
        dataTemp.setDate(dataTemp.getDate()+1);
      }

      const dataFormatada=dataTemp.toLocaleDateString('pt-BR');
      const aula=aulas[i-1];

      const li=document.createElement('li');
      const a=document.createElement('div');
      a.className="dia-card locked";
      a.innerHTML=`
        <div class="status">🔒 Dia ${i}</div>
        <small>${dataFormatada}</small>
        <div>${aula.titulo}</div>
      `;
      a.onclick=function(){togglePopup(this,i)};

      const popup=document.createElement('div');
      popup.className='popup-content';
      popup.id='popup'+i;
      
      // Monta os tópicos do conteúdo em HTML
      let conteudoHTML = '';
      aula.conteudo.forEach(item => {
        conteudoHTML += `<li>${item}</li>`;
      });

      popup.innerHTML=`
        <h4>Dia ${i} – ${aula.titulo}</h4>
        <p><strong>Data:</strong> ${dataFormatada}</p>
        <p><strong>Conteúdo:</strong></p>
        <ul style="padding-left: 20px; list-style-type: disc;">${conteudoHTML}</ul>
        <p><strong>Exercício:</strong> ${aula.exercicio}</p>
        <button onclick="fecharPopup(${i})">Fechar</button>
      `;

      li.appendChild(a);
      li.appendChild(popup);
      ul.appendChild(li);

      dataTemp.setDate(dataTemp.getDate()+1);
    }

    div.appendChild(ul);
    container.appendChild(div);
  });
}

function atualizarLiberacao(diasLiberados){
  const links=document.querySelectorAll('.dia-card');
  links.forEach((link,index)=>{
    if(index<diasLiberados){
      link.classList.remove('locked');
      link.classList.add('liberado');
      link.querySelector('.status').innerHTML=`🔓 Dia ${index+1}`;
    }
  });

  let percentual=Math.round((diasLiberados/totalDias)*100);
  document.getElementById('progressBar').style.width=percentual+'%';
  document.getElementById('progressBar').innerText=percentual+'%';
}

function togglePopup(elemento,dia){
  if(elemento.classList.contains('locked')) return;
  const popup=document.getElementById('popup'+dia);
  popup.style.display= popup.style.display==='block'?'none':'block';
}

function fecharPopup(dia){
  document.getElementById('popup'+dia).style.display='none';
}
</script>

</body>
</html>
